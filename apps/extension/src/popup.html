<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>가치 마추기 방장 연결</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, sans-serif;
      }

      body {
        margin: 0;
        min-width: 320px;
        background: #10141f;
        color: #f5f7fb;
      }

      main {
        padding: 16px;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 16px;
      }

      p {
        margin: 0 0 16px;
        color: #b8c1d9;
        font-size: 12px;
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 12px;
        color: #d7ddf0;
      }

      input {
        border: 1px solid #3a435d;
        border-radius: 8px;
        padding: 10px 12px;
        background: #171d2d;
        color: inherit;
        font: inherit;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        background: #6d7cff;
        color: #ffffff;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.65;
        cursor: progress;
      }

      #status {
        min-height: 18px;
        font-size: 12px;
        color: #b8c1d9;
      }

      #status[data-state="error"] {
        color: #ff9b9b;
      }

      #status[data-state="success"] {
        color: #9af0b5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>방장 연결</h1>
      <p>마추기아이오 탭을 열어둔 뒤, 확장 프로그램을 방장으로 연결합니다.</p>
      <form id="pair-form">
        <label for="server-url">
          서버 URL
          <input id="server-url" name="serverUrl" type="url" placeholder="https://api.machugi.io" required />
        </label>
        <label for="room-code">
          방 코드
          <input id="room-code" name="roomCode" type="text" maxlength="12" autocapitalize="characters" required />
        </label>
        <label for="host-token">
          방장 토큰
          <input id="host-token" name="hostToken" type="password" spellcheck="false" required />
        </label>
        <button id="pair-button" type="submit">확장 프로그램 연결</button>
      </form>
      <output id="status" aria-live="polite"></output>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
