<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>가치 마추기 방장 연결</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, sans-serif;
      }

      body {
        margin: 0;
        min-width: 320px;
        background: #10141f;
        color: #f5f7fb;
      }

      main {
        padding: 16px;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 16px;
      }

      p {
        margin: 0 0 16px;
        color: #b8c1d9;
        font-size: 12px;
      }

      form {
        display: grid;
        gap: 12px;
      }

      .pairing-summary {
        display: grid;
        gap: 8px;
        border: 1px solid #3a435d;
        border-radius: 8px;
        padding: 10px;
        background: #171d2d;
      }

      .summary-row {
        display: grid;
        gap: 4px;
      }

      .summary-row span {
        color: #b8c1d9;
        font-size: 11px;
        font-weight: 700;
      }

      .summary-row code,
      .summary-row strong {
        min-width: 0;
        overflow-wrap: anywhere;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        background: #6d7cff;
        color: #ffffff;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.65;
        cursor: progress;
      }

      .hint {
        margin-top: -4px;
      }

      #status {
        min-height: 18px;
        font-size: 12px;
        color: #b8c1d9;
      }

      #status[data-state="error"] {
        color: #ff9b9b;
      }

      #status[data-state="success"] {
        color: #9af0b5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>방장 연결</h1>
      <p>방장 화면에서 자동 저장된 연결 정보로 마추기아이오 탭을 연결합니다.</p>
      <form id="pair-form">
        <section class="pairing-summary" aria-label="저장된 연결 정보">
          <div class="summary-row">
            <span>서버 URL</span>
            <code id="server-url">-</code>
          </div>
          <div class="summary-row">
            <span>방 코드</span>
            <strong id="room-code">-</strong>
          </div>
        </section>
        <p class="hint">방 코드와 방장 코드는 방장 화면에서 자동 저장됩니다.</p>
        <button id="pair-button" type="submit">확장 프로그램 연결</button>
      </form>
      <output id="status" aria-live="polite"></output>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
